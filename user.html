<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold King - Game App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 10px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        header {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
        }
        
        h1 {
            color: #1e3c72;
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .balance-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        
        .balance-value {
            font-size: 24px;
            font-weight: bold;
            margin-top: 5px;
        }
        
        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        .card h2 {
            color: #1e3c72;
            font-size: 18px;
            margin-bottom: 15px;
            text-align: center;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .game-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .game-option {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .game-option:hover {
            transform: scale(1.05);
        }
        
        .game-option.selected {
            border-color: white;
        }
        
        .game-multiplier {
            font-size: 20px;
            font-weight: bold;
            margin-top: 5px;
        }
        
        .timer-display {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 15px;
            font-family: 'Courier New', monospace;
        }
        
        .timer-value {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
        }
        
        .input-section {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #667eea;
            border-radius: 5px;
            font-size: 14px;
        }
        
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .btn-place {
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
            color: white;
        }
        
        .btn-place:hover {
            transform: translateY(-2px);
        }
        
        .btn-cancel {
            background: #e74c3c;
            color: white;
        }
        
        .alert {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
            font-size: 12px;
            text-align: center;
        }
        
        .alert.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .alert.success {
            background: #d4edda;
            color: #155724;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎰 Gold King</h1>
            <div class="balance-box">
                <div>Your Balance</div>
                <div class="balance-value" id="balance">₹0</div>
            </div>
        </header>
        
        <div id="alerts"></div>
        
        <div class="card">
            <h2>🎯 Select Game</h2>
            <div class="game-grid">
                <div class="game-option selected" onclick="selectGame('number')">
                    <div>Seedha Number</div>
                    <div class="game-multiplier">90×</div>
                </div>
                <div class="game-option" onclick="selectGame('group')">
                    <div>Group Bet</div>
                    <div class="game-multiplier">1.9×</div>
                </div>
                <div class="game-option" onclick="selectGame('andarbahar')">
                    <div>Andar Bahar</div>
                    <div class="game-multiplier">9×</div>
                </div>
            </div>
        </div>
        
        <div class="timer-display">
            <div style="font-size: 12px; color: #666; margin-bottom: 5px;">Next Draw In</div>
            <div class="timer-value" id="timerValue">00:00</div>
        </div>
        
        <div class="card">
            <h2>💰 Place Your Bet</h2>
            
            <div class="input-section">
                <label>Choose Number (0-99)</label>
                <input type="number" id="betNumber" min="0" max="99" placeholder="Enter number">
            </div>
            
            <div class="input-section">
                <label>Bet Amount</label>
                <input type="number" id="betAmount" min="10" placeholder="Minimum ₹10">
            </div>
            
            <button class="btn-place" onclick="placeBet()">✅ PLACE BET</button>
            <button class="btn-cancel" onclick="clearForm()">Clear</button>
        </div>
        
        <div class="card">
            <h2>📋 Recent Bets</h2>
            <div id="betHistory" style="text-align: center; color: #999; padding: 20px;">
                No bets yet. Start playing! 🚀
            </div>
        </div>
    </div>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, doc, getDoc, query, where, getDocs, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let currentGame = 'number';
        let currentUser = null;
        let timeRemaining = 30;
        
        window.selectGame = function(game) {
            currentGame = game;
            document.querySelectorAll('.game-option').forEach(el => el.classList.remove('selected'));
            event.target.closest('.game-option').classList.add('selected');
        }
        
        window.placeBet = async function() {
            try {
                if (!currentUser) {
                    showAlert('Please login first', 'error');
                    return;
                }
                
                const number = parseInt(document.getElementById('betNumber').value);
                const amount = parseInt(document.getElementById('betAmount').value);
                
                if (isNaN(number) || number < 0 || number > 99) {
                    showAlert('Please enter valid number (0-99)', 'error');
                    return;
                }
                
                if (isNaN(amount) || amount < 10) {
                    showAlert('Minimum bet is ₹10', 'error');
                    return;
                }
                
                const userDoc = await getDoc(doc(db, 'users', currentUser.uid));
                const currentBalance = userDoc.data().balance;
                
                if (currentBalance < amount) {
                    showAlert('Insufficient balance!', 'error');
                    return;
                }
                
                const betData = {
                    userId: currentUser.uid,
                    gameType: currentGame,
                    number: number,
                    amount: amount,
                    timestamp: new Date(),
                    status: 'pending'
                };
                
                const betRef = await addDoc(collection(db, 'bets'), betData);
                const newBalance = currentBalance - amount;
                await updateDoc(doc(db, 'users', currentUser.uid), { balance: newBalance });
                
                document.getElementById('balance').textContent = '₹' + newBalance;
                showAlert('Bet placed! ✓', 'success');
                clearForm();
                loadBetHistory();
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            }
        }
        
        window.clearForm = function() {
            document.getElementById('betNumber').value = '';
            document.getElementById('betAmount').value = '';
        }
        
        async function loadBetHistory() {
            try {
                if (!currentUser) return;
                const q = query(collection(db, 'bets'), where('userId', '==', currentUser.uid), orderBy('timestamp', 'desc'), limit(10));
                const querySnapshot = await getDocs(q);
                const historyDiv = document.getElementById('betHistory');
                
                if (querySnapshot.empty) {
                    historyDiv.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">No bets yet. Start playing! 🚀</div>';
                    return;
                }
                
                historyDiv.innerHTML = '';
                querySnapshot.forEach(doc => {
                    const bet = doc.data();
                    const status = bet.status || 'pending';
                    historyDiv.innerHTML += `<div style="padding: 10px; border-bottom: 1px solid #eee; font-size: 13px;">Number: ${bet.number} | ₹${bet.amount} | <span style="color: ${status === 'won' ? 'green' : 'red'}">${status.toUpperCase()}</span></div>`;
                });
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        function updateTimer() {
            const mins = Math.floor(timeRemaining / 60);
            const secs = timeRemaining % 60;
            document.getElementById('timerValue').textContent = String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
            timeRemaining--;
            if (timeRemaining < 0) timeRemaining = 30;
        }
        
        function showAlert(message, type) {
            const alertsDiv = document.getElementById('alerts');
            const alert = document.createElement('div');
            alert.className = `alert ${type}`;
            alert.textContent = message;
            alertsDiv.appendChild(alert);
            setTimeout(() => alert.remove(), 3000);
        }
        
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                document.getElementById('balance').textContent = '₹' + userDoc.data().balance;
                loadBetHistory();
            }
        });
        
        updateTimer();
        setInterval(updateTimer, 1000);
    </script>
</body>
</html>
